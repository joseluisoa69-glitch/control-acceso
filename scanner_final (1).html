<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Control de Acceso QR</title>
<!-- QR Code generator -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<!-- jsPDF para generar PDF en navegador -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- Escáner QR -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --surface: #0f1623;
  --card: #141d2e;
  --border: #1e2d45;
  --accent: #00d4ff;
  --accent2: #0066ff;
  --success: #00e676;
  --danger: #ff1744;
  --warning: #ffab00;
  --text: #e8edf5;
  --muted: #4a6080;
  --font-display: 'Rajdhani', sans-serif;
  --font-body: 'Inter', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100dvh}

/* Grid lines bg */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,212,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,.04) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0;
}

.app{max-width:500px;margin:0 auto;padding:16px 14px 60px;position:relative;z-index:1}

/* ── HEADER ── */
.header{text-align:center;padding:20px 0 18px;margin-bottom:20px;border-bottom:1px solid var(--border)}
.pulse-dot{display:inline-block;width:7px;height:7px;background:var(--accent);border-radius:50%;
  margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.4)}70%{box-shadow:0 0 0 8px transparent}}
.header-tag{font-family:var(--font-display);font-size:11px;letter-spacing:3px;color:var(--accent);
  text-transform:uppercase;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.header h1{font-family:var(--font-display);font-size:1.8em;font-weight:700;color:#fff;letter-spacing:1px}
.header h1 span{color:var(--accent)}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}

/* ── FORM ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);margin-bottom:7px;font-family:var(--font-display)}
.field input{width:100%;padding:12px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:15px;font-family:var(--font-body);
  transition:border-color .2s,box-shadow .2s}
.field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:46px}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0;line-height:1}

/* ── BUTTONS ── */
.btn{width:100%;padding:13px;border:none;border-radius:8px;font-weight:700;
  font-size:15px;cursor:pointer;transition:all .2s;letter-spacing:.5px;margin-top:6px}
.btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-danger{background:rgba(255,23,68,.15);border:1px solid rgba(255,23,68,.4);color:var(--danger)}
.btn-danger:hover{background:rgba(255,23,68,.25)}

/* ── NAV ── */
.nav{display:flex;gap:8px;margin-bottom:18px}
.nav-btn{flex:1;padding:11px 6px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;
  transition:all .2s;text-align:center;font-family:var(--font-body)}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-btn.active{background:rgba(0,212,255,.08);border-color:var(--accent);color:var(--accent)}
.nav-btn.logout{background:rgba(255,23,68,.06);border-color:rgba(255,23,68,.25);color:var(--danger)}

/* ── SCANNER ── */
.scanner-label{font-family:var(--font-display);font-size:11px;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);margin-bottom:12px}
#reader{width:100%;border-radius:10px;overflow:hidden;border:2px solid var(--border);
  background:#000;min-height:260px;position:relative}
#reader__scan_region{background:transparent!important}
#reader__dashboard{padding:8px!important;background:var(--surface)!important}
#reader__status_span{display:none!important}
#reader__camera_selection{background:var(--surface)!important;color:var(--text)!important;
  border:1px solid var(--border)!important;border-radius:6px!important;
  padding:6px!important;font-size:12px!important;width:100%!important}
#html5-qrcode-button-camera-start,#html5-qrcode-button-camera-stop,
#html5-qrcode-button-camera-permission{
  background:var(--accent)!important;color:#000!important;border:none!important;
  border-radius:6px!important;padding:8px 14px!important;font-weight:700!important;
  cursor:pointer!important;font-size:12px!important;margin:3px!important}
#html5-qrcode-button-camera-stop{background:var(--danger)!important;color:#fff!important}

/* ── RESULT BOX ── */
.result{margin-top:14px;padding:14px 16px;border-radius:10px;font-size:14px;
  font-weight:600;line-height:1.5;white-space:pre-line;display:none;animation:fadeUp .3s ease}
.result.show{display:block}
.result.success{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.35);color:var(--success)}
.result.danger {background:rgba(255,23,68,.1); border:1px solid rgba(255,23,68,.35); color:var(--danger)}
.result.info   {background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.3); color:var(--accent)}
.result.warning{background:rgba(255,171,0,.1); border:1px solid rgba(255,171,0,.35);color:var(--warning)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── GENERATOR ── */
.gen-select{width:100%;padding:12px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;margin-top:6px;cursor:pointer}
.gen-select:focus{outline:none;border-color:var(--accent)}
.gen-input{width:100%;padding:12px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;margin-top:6px}
.gen-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1)}

/* ── ALERT INLINE ── */
.alert{padding:12px 14px;border-radius:8px;font-size:13px;font-weight:500;
  margin-top:12px;display:none;animation:fadeUp .3s ease}
.alert.show{display:block}
.alert.success{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.3);color:var(--success)}
.alert.danger {background:rgba(255,23,68,.1); border:1px solid rgba(255,23,68,.3); color:var(--danger)}
.alert.warning{background:rgba(255,171,0,.1); border:1px solid rgba(255,171,0,.3);color:var(--warning)}
.alert.info   {background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.3); color:var(--accent)}

/* ── PROGRESS BAR ── */
.progress-wrap{margin-top:12px;display:none}
.progress-wrap.show{display:block}
.progress-bar{height:4px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));
  border-radius:4px;transition:width .3s ease;width:0%}
.progress-text{font-size:11px;color:var(--muted);text-align:center}

.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-tag"><span class="pulse-dot"></span>Sistema Activo</div>
    <h1>Control de <span>Acceso</span></h1>
  </div>

  <!-- LOGIN -->
  <div id="loginView">
    <div class="card">
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="usuario@empresa.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <div class="pass-wrap">
          <input type="password" id="password" placeholder="••••••••"
                 onkeydown="if(event.key==='Enter')login()">
          <button class="eye" onclick="togglePass()">👁️</button>
        </div>
      </div>
      <button class="btn btn-primary" id="btnLogin" onclick="login()">Ingresar al sistema</button>
      <div class="alert" id="loginMsg"></div>
    </div>
  </div>

  <!-- PANEL PRINCIPAL -->
  <div id="mainView" class="hidden">
    <div class="nav">
      <button class="nav-btn active" id="navScan" onclick="showView('scan')">📷 Escanear</button>
      <button class="nav-btn"        id="navGen"  onclick="showView('gen')">🪪 Gafetes</button>
      <button class="nav-btn logout"              onclick="logout()">⏻ Salir</button>
    </div>

    <!-- ESCÁNER -->
    <div id="scanView">
      <div class="card">
        <div class="scanner-label">▸ Escáner en vivo</div>
        <div id="reader"></div>
        <div class="result" id="scanResult"></div>
      </div>
    </div>

    <!-- GENERADOR PDF -->
    <div id="genView" class="hidden">
      <div class="card">
        <div class="scanner-label">▸ Generador de gafetes PDF</div>
        <div class="field">
          <label>Modo</label>
          <select class="gen-select" id="modoGen" onchange="toggleParams()">
            <option value="todos">Todo el listado</option>
            <option value="rango">Por rango de IDs</option>
            <option value="individual">IDs específicos</option>
          </select>
        </div>
        <div id="pRango" class="hidden">
          <div class="field">
            <label>ID Inicio</label>
            <input type="number" class="gen-input" id="rInicio" placeholder="1">
          </div>
          <div class="field">
            <label>ID Fin</label>
            <input type="number" class="gen-input" id="rFin" placeholder="50">
          </div>
        </div>
        <div id="pIndividual" class="hidden">
          <div class="field">
            <label>IDs separados por coma</label>
            <input type="text" class="gen-input" id="rIds" placeholder="1, 5, 87">
          </div>
        </div>
        <button class="btn btn-primary" id="btnGen" onclick="generarPDF()">⬇️ Generar y descargar PDF</button>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <div class="progress-text" id="progressText">Preparando...</div>
        </div>
        <div class="alert" id="genMsg"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// ⚙️  CONFIGURA AQUÍ TU URL DE APPS SCRIPT
// ══════════════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyME7h87vWO2ZsvCE932oGN36BGIjKgpLCkbNPy-PrE7TJkLkh0fLyBiIzHQPu1YHka/exec';

// ── ESTADO ──
let scanner = null, isScanning = false, isProcessing = false;

// ── BACKEND ──
function api(payload) {
  return fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(payload),
    headers: { 'Content-Type': 'text/plain' }
  }).then(r => r.json());
}

// ── UI ──
function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.className = 'alert show ' + type;
  el.textContent = msg;
  if (type === 'success' || type === 'danger')
    setTimeout(() => { el.className = 'alert'; }, 5000);
}
function showResult(msg, type) {
  const el = document.getElementById('scanResult');
  el.className = 'result show ' + type;
  el.textContent = msg;
  if (type === 'success' || type === 'danger')
    setTimeout(() => { el.className = 'result'; }, 4000);
}
function togglePass() {
  const i = document.getElementById('password');
  i.type = i.type === 'password' ? 'text' : 'password';
}

// ── LOGIN ──
function login() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value.trim();
  if (!email || !pass) { showAlert('loginMsg','Completa ambos campos.','danger'); return; }
  const btn = document.getElementById('btnLogin');
  btn.disabled = true; btn.textContent = 'Verificando…';
  showAlert('loginMsg','Conectando…','warning');
  api({ action:'validarLogin', correo:email, password:pass })
    .then(res => {
      btn.disabled = false; btn.textContent = 'Ingresar al sistema';
      if (res.success) {
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('mainView').classList.remove('hidden');
        document.getElementById('loginMsg').className = 'alert';
        iniciarScanner();
      } else { showAlert('loginMsg', res.message || 'Error', 'danger'); }
    })
    .catch(() => {
      btn.disabled = false; btn.textContent = 'Ingresar al sistema';
      showAlert('loginMsg','Error de red. Verifica la URL del backend.','danger');
    });
}

function logout() {
  detenerScanner();
  document.getElementById('mainView').classList.add('hidden');
  document.getElementById('loginView').classList.remove('hidden');
  document.getElementById('email').value = '';
  document.getElementById('password').value = '';
}

// ── VISTAS ──
function showView(v) {
  document.getElementById('scanView').classList.toggle('hidden', v !== 'scan');
  document.getElementById('genView').classList.toggle('hidden',  v !== 'gen');
  document.getElementById('navScan').classList.toggle('active',  v === 'scan');
  document.getElementById('navGen').classList.toggle('active',   v === 'gen');
  if (v === 'scan') iniciarScanner(); else detenerScanner();
}

// ── SCANNER ──
function iniciarScanner() {
  if (isScanning) return;
  if (scanner) { try { scanner.clear(); } catch(e){} scanner = null; }
  scanner = new Html5Qrcode('reader');
  const cfg = { fps:10, qrbox:{width:230,height:230}, aspectRatio:1.0 };
  const try_ = c => scanner.start(c, cfg, onQR, ()=>{});
  try_({ facingMode:'environment' })
    .then(() => { isScanning=true; })
    .catch(() => try_({ facingMode:'user' })
      .then(() => { isScanning=true; })
      .catch(() => Html5Qrcode.getCameras()
        .then(cams => {
          if (!cams||!cams.length) { showResult('No se encontró cámara.','danger'); return; }
          return try_(cams[cams.length-1].id).then(()=>{ isScanning=true; });
        })
        .catch(() => showResult('No se pudo acceder a la cámara. Verifica permisos.','danger'))
      )
    );
}

function detenerScanner() {
  if (scanner && isScanning)
    scanner.stop().then(()=>{ isScanning=false; }).catch(()=>{ isScanning=false; });
}

function onQR(text) {
  if (isProcessing) return;
  isProcessing = true;
  showResult('🔍 Validando ID: ' + text + '…', 'info');
  api({ action:'registrarEscaneo', id:text })
    .then(res => {
      showResult(res.message, res.success ? 'success' : 'danger');
      setTimeout(() => { isProcessing = false; }, 3000);
    })
    .catch(() => {
      showResult('Error de red al validar.', 'danger');
      setTimeout(() => { isProcessing = false; }, 3000);
    });
}

// ── GENERADOR PDF — 100% en navegador ──
function toggleParams() {
  const m = document.getElementById('modoGen').value;
  document.getElementById('pRango').classList.toggle('hidden',     m !== 'rango');
  document.getElementById('pIndividual').classList.toggle('hidden', m !== 'individual');
}

function setProgress(pct, texto) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = texto;
}

async function generarPDF() {
  const modo = document.getElementById('modoGen').value;
  const btn  = document.getElementById('btnGen');
  const params = { action:'obtenerPersonalParaPDF', modo };

  if (modo === 'rango') {
    params.inicio = document.getElementById('rInicio').value;
    params.fin    = document.getElementById('rFin').value;
    if (!params.inicio || !params.fin) { showAlert('genMsg','Ingresa el rango completo.','warning'); return; }
  } else if (modo === 'individual') {
    params.ids = document.getElementById('rIds').value.trim();
    if (!params.ids) { showAlert('genMsg','Ingresa al menos un ID.','warning'); return; }
  }

  btn.disabled = true;
  document.getElementById('progressWrap').className = 'progress-wrap show';
  document.getElementById('genMsg').className = 'alert';
  setProgress(5, 'Obteniendo datos del servidor…');

  try {
    // 1. Obtener lista de personal desde Apps Script
    const res = await api(params);
    if (!res.success) {
      showAlert('genMsg', '❌ ' + res.message, 'danger');
      btn.disabled = false;
      document.getElementById('progressWrap').className = 'progress-wrap';
      return;
    }

    const personal = res.personal;
    const logo     = res.logo || '';
    setProgress(15, 'Generando códigos QR…');

    // 2. Generar QR en canvas para cada persona usando qrcodejs
    const qrDataURLs = {};
    const qrContainer = document.createElement('div');
    qrContainer.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:200px;height:200px';
    document.body.appendChild(qrContainer);

    for (let i = 0; i < personal.length; i++) {
      const p = personal[i];
      qrDataURLs[p.id] = await new Promise((resolve) => {
        qrContainer.innerHTML = '';
        try {
          const qr = new QRCode(qrContainer, {
            text: String(p.id),
            width: 200, height: 200,
            correctLevel: QRCode.CorrectLevel.H
          });
          // qrcodejs es síncrono, el canvas está listo de inmediato
          setTimeout(() => {
            const canvas = qrContainer.querySelector('canvas');
            const img    = qrContainer.querySelector('img');
            if (canvas) resolve(canvas.toDataURL('image/png'));
            else if (img) resolve(img.src);
            else resolve('');
          }, 50);
        } catch(e) { resolve(''); }
      });
      const pct = 15 + Math.round((i + 1) / personal.length * 55);
      setProgress(pct, 'QR ' + (i+1) + ' de ' + personal.length + '…');
    }
    document.body.removeChild(qrContainer);

    setProgress(72, 'Construyendo PDF…');

    // 3. Generar PDF con jsPDF
    const { jsPDF } = window.jspdf;
    const doc  = new jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });

    const pageW  = 215.9, pageH = 279.4;
    const margin = 8;
    const cols   = 3, rows = 3;
    const cardW  = (pageW - margin*2 - (cols-1)*4) / cols;  // ~62mm
    const cardH  = (pageH - margin*2 - (rows-1)*4) / rows;  // ~84mm

    let page = 0;
    for (let i = 0; i < personal.length; i++) {
      const p   = personal[i];
      const col = i % cols;
      const row = Math.floor(i / cols) % rows;

      // Nueva página
      if (i > 0 && i % (cols * rows) === 0) {
        doc.addPage();
        page++;
      }

      const x = margin + col * (cardW + 4);
      const y = margin + row * (cardH + 4);

      // Fondo blanco + borde
      doc.setFillColor(255, 255, 255);
      doc.setDrawColor(40, 40, 40);
      doc.setLineWidth(0.4);
      doc.roundedRect(x, y, cardW, cardH, 3, 3, 'FD');

      let cy = y + 3;

      // Logo
      if (logo) {
        try {
          const logoH = 8, logoW = 20;
          const lx = x + (cardW - logoW) / 2;
          doc.addImage(logo, 'PNG', lx, cy, logoW, logoH, '', 'FAST');
          cy += logoH + 2;
        } catch(e) { cy += 3; }
      } else { cy += 2; }

      // Empresa
      doc.setFont('helvetica','bold');
      doc.setFontSize(5.5);
      doc.setTextColor(60,60,60);
      const empresaLines = doc.splitTextToSize(p.empresa.toUpperCase(), cardW - 4);
      doc.text(empresaLines, x + cardW/2, cy, {align:'center'});
      cy += empresaLines.length * 3.5 + 2;

      // QR
      const qr    = qrDataURLs[p.id];
      const qrSz  = 30;
      const qx    = x + (cardW - qrSz) / 2;
      if (qr) {
        doc.addImage(qr, 'PNG', qx, cy, qrSz, qrSz, '', 'FAST');
      } else {
        doc.setDrawColor(200,200,200);
        doc.rect(qx, cy, qrSz, qrSz);
        doc.setFontSize(5); doc.setTextColor(150,150,150);
        doc.text('QR', x + cardW/2, cy + qrSz/2, {align:'center'});
      }
      cy += qrSz + 2;

      // ID
      doc.setFont('helvetica','bold');
      doc.setFontSize(9);
      doc.setTextColor(0, 86, 179);
      doc.text('ID: ' + p.id, x + cardW/2, cy, {align:'center'});
      cy += 5;

      // Nombre
      doc.setFont('helvetica','bold');
      doc.setFontSize(7);
      doc.setTextColor(20,20,20);
      const nombreLines = doc.splitTextToSize(p.nombre, cardW - 4);
      doc.text(nombreLines, x + cardW/2, cy, {align:'center'});
      cy += nombreLines.length * 4 + 1;

      // Puesto
      doc.setFont('helvetica','normal');
      doc.setFontSize(6);
      doc.setTextColor(90,90,90);
      const puestoLines = doc.splitTextToSize(p.puesto, cardW - 4);
      doc.text(puestoLines, x + cardW/2, cy, {align:'center'});
    }

    setProgress(95, 'Guardando PDF…');
    doc.save('Gafetes_QR.pdf');

    setProgress(100, '✅ PDF descargado exitosamente');
    showAlert('genMsg', '✅ PDF generado con ' + personal.length + ' gafetes', 'success');

  } catch(err) {
    showAlert('genMsg', '❌ Error: ' + err.message, 'danger');
    console.error(err);
  } finally {
    btn.disabled = false;
    setTimeout(() => {
      document.getElementById('progressWrap').className = 'progress-wrap';
    }, 3000);
  }
}
</script>
</body>
</html>
