<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Control de Acceso — Escáner</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --border: #1e293b;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --success: #00ff87;
      --danger: #ff3d5a;
      --warning: #ffb800;
      --text: #e2e8f0;
      --muted: #64748b;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .app { width: 100%; max-width: 480px; padding: 20px 16px 40px; position: relative; z-index: 1; }

    /* HEADER */
    .header {
      text-align: center;
      padding: 24px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .header-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
      color: var(--accent); text-transform: uppercase;
      border: 1px solid rgba(0,229,255,0.3); border-radius: 20px;
      padding: 4px 12px; margin-bottom: 12px;
    }
    .header-badge::before { content: '●'; font-size: 8px; animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .header h1 { font-size: 1.5em; font-weight: 700; color: #fff; line-height: 1.2; }
    .header h1 span { color: var(--accent); }

    /* LOGIN */
    #loginView { animation: slideUp 0.4s ease; }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 11px; font-family: var(--mono);
      letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px;
    }
    .field input {
      width: 100%; padding: 13px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 15px;
      font-family: var(--sans); transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.1); }

    .pass-wrap { position: relative; }
    .pass-wrap input { padding-right: 48px; }
    .eye-btn {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 18px;
      color: var(--muted); padding: 0; line-height: 1;
    }

    .btn-primary {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 8px; color: #fff;
      font-weight: 700; font-size: 15px; letter-spacing: 0.5px;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    /* MAIN NAV */
    #mainView { animation: slideUp 0.4s ease; }
    .nav { display: flex; gap: 8px; margin-bottom: 20px; }
    .nav-btn {
      flex: 1; padding: 12px 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; text-align: center;
    }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    .nav-btn.active { background: rgba(0,229,255,0.1); border-color: var(--accent); color: var(--accent); }
    .nav-btn.danger { background: rgba(255,61,90,0.08); border-color: rgba(255,61,90,0.3); color: var(--danger); }
    .nav-btn.danger:hover { background: rgba(255,61,90,0.15); }

    /* SCANNER SECTION */
    .section-title {
      font-family: var(--mono); font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
    }

    #reader {
      width: 100%; border-radius: 12px; overflow: hidden;
      border: 2px solid var(--border); background: #000;
      position: relative; min-height: 280px;
    }
    /* Corner accents on scanner */
    #reader::before, #reader::after {
      content: ''; position: absolute; width: 24px; height: 24px;
      border-color: var(--accent); border-style: solid; z-index: 10; pointer-events: none;
    }
    #reader::before { top: 10px; left: 10px; border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
    #reader::after  { top: 10px; right: 10px; border-width: 2px 2px 0 0; border-radius: 0 3px 0 0; }

    /* Hide ugly internal html5-qrcode UI elements */
    #reader__scan_region { background: transparent !important; }
    #reader__dashboard { padding: 8px !important; background: var(--surface) !important; }
    #reader__dashboard_section_csr span { color: var(--muted) !important; font-size: 11px !important; }
    #reader__status_span { display: none !important; }
    #reader__camera_selection {
      background: var(--surface) !important; color: var(--text) !important;
      border: 1px solid var(--border) !important; border-radius: 6px !important;
      padding: 6px !important; font-size: 12px !important; width: 100% !important;
    }
    #html5-qrcode-button-camera-start, #html5-qrcode-button-camera-stop,
    #html5-qrcode-button-camera-permission {
      background: var(--accent) !important; color: #000 !important;
      border: none !important; border-radius: 6px !important;
      padding: 8px 16px !important; font-weight: 700 !important;
      cursor: pointer !important; font-size: 13px !important;
      margin: 4px 2px !important;
    }
    #html5-qrcode-button-camera-stop { background: var(--danger) !important; color: #fff !important; }

    /* RESULT BOX */
    .result-box {
      margin-top: 16px; padding: 16px 20px;
      border-radius: 10px; text-align: center;
      font-size: 15px; font-weight: 600;
      animation: slideUp 0.3s ease;
      display: none;
    }
    .result-box.show { display: block; }
    .result-box.success { background: rgba(0,255,135,0.1); border: 1px solid rgba(0,255,135,0.4); color: var(--success); }
    .result-box.danger  { background: rgba(255,61,90,0.1);  border: 1px solid rgba(255,61,90,0.4);  color: var(--danger); }
    .result-box.info    { background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.3);  color: var(--accent); }
    .result-box.warning { background: rgba(255,184,0,0.1);  border: 1px solid rgba(255,184,0,0.4);  color: var(--warning); }

    /* GENERATOR SECTION */
    #generatorSection select {
      width: 100%; padding: 13px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px;
      cursor: pointer; margin-top: 6px;
    }
    #generatorSection select:focus { outline: none; border-color: var(--accent); }
    #generatorSection input[type="number"],
    #generatorSection input[type="text"] {
      width: 100%; padding: 13px 16px; margin-top: 6px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px;
    }
    #generatorSection input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.1); }

    /* Alert inline */
    .inline-alert {
      padding: 12px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 500; margin-top: 14px;
      display: none; animation: slideUp 0.3s ease;
    }
    .inline-alert.show { display: block; }
    .inline-alert.success { background: rgba(0,255,135,0.1); border: 1px solid rgba(0,255,135,0.3); color: var(--success); }
    .inline-alert.danger  { background: rgba(255,61,90,0.1);  border: 1px solid rgba(255,61,90,0.3);  color: var(--danger); }
    .inline-alert.warning { background: rgba(255,184,0,0.1);  border: 1px solid rgba(255,184,0,0.3);  color: var(--warning); }
    .inline-alert.info    { background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.3);  color: var(--accent); }

    .hidden { display: none !important; }

    /* Config note */
    .config-note {
      margin-top: 20px; padding: 14px 16px;
      background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.3);
      border-radius: 8px; font-size: 12px; color: #a78bfa;
      font-family: var(--mono);
    }
    .config-note strong { color: #c4b5fd; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-badge">Sistema Activo</div>
    <h1>Control de <span>Acceso QR</span></h1>
  </div>

  <!-- ── LOGIN ── -->
  <div id="loginView">
    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" id="email" placeholder="usuario@empresa.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <div class="pass-wrap">
        <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
        <button class="eye-btn" onclick="togglePass()" type="button">👁️</button>
      </div>
    </div>
    <button class="btn-primary" id="btnLogin" onclick="login()">Ingresar al sistema</button>
    <div id="loginMsg"></div>

    <div class="config-note">
      <strong>⚙️ CONFIGURACIÓN REQUERIDA</strong>
      Edita la variable <code>APPS_SCRIPT_URL</code> en este archivo con la URL de tu Web App de Apps Script.
    </div>
  </div>

  <!-- ── PANEL PRINCIPAL ── -->
  <div id="mainView" class="hidden">
    <div class="nav">
      <button class="nav-btn active" id="navScan" onclick="showView('scannerSection')">📷 Escanear</button>
      <button class="nav-btn" id="navGen"  onclick="showView('generatorSection')">🪪 Gafetes</button>
      <button class="nav-btn danger" onclick="logout()">Salir</button>
    </div>

    <!-- ESCÁNER -->
    <div id="scannerSection">
      <div class="section-title">▸ Escáner QR en vivo</div>
      <div id="reader"></div>
      <div class="result-box" id="scanResult"></div>
    </div>

    <!-- GENERADOR -->
    <div id="generatorSection" class="hidden">
      <div class="section-title">▸ Generador de gafetes PDF</div>
      <div class="field">
        <label>Modo de generación</label>
        <select id="modoGeneracion" onchange="toggleParams()">
          <option value="todos">Todo el listado</option>
          <option value="rango">Por rango de IDs</option>
          <option value="individual">IDs específicos</option>
        </select>
      </div>
      <div id="paramsRango" class="hidden">
        <div class="field">
          <label>ID Inicio</label>
          <input type="number" id="rangoInicio" placeholder="Ej: 1">
        </div>
        <div class="field">
          <label>ID Fin</label>
          <input type="number" id="rangoFin" placeholder="Ej: 50">
        </div>
      </div>
      <div id="paramsIndividual" class="hidden">
        <div class="field">
          <label>IDs separados por coma</label>
          <input type="text" id="idsIndividuales" placeholder="1, 5, 87">
        </div>
      </div>
      <button class="btn-primary" id="btnGenerar" onclick="generarPDF()">⬇️ Generar y descargar PDF</button>
      <div class="inline-alert" id="pdfStatus"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// ⚠️  CONFIGURA ESTA URL CON LA DE TU WEB APP  ⚠️
// Ejemplo: https://script.google.com/macros/s/AKfy.../exec
// ══════════════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyME7h87vWO2ZsvCE932oGN36BGIjKgpLCkbNPy-PrE7TJkLkh0fLyBiIzHQPu1YHka/exec';

// ── ESTADO ──
let scanner = null;
let isScanning = false;
let isProcessing = false;

// ── LLAMADAS AL BACKEND (fetch con JSONP fallback) ──
function callBackend(action, params = {}) {
  return new Promise((resolve, reject) => {
    const body = JSON.stringify({ action, ...params });
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body,
      headers: { 'Content-Type': 'text/plain' } // Apps Script acepta esto sin preflight
    })
    .then(r => r.json())
    .then(resolve)
    .catch(reject);
  });
}

// ── UI HELPERS ──
function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.className = `inline-alert show ${type}`;
  el.textContent = msg;
  if (type === 'success' || type === 'danger') {
    setTimeout(() => { el.className = 'inline-alert'; }, 5000);
  }
}
function showResult(msg, type) {
  const el = document.getElementById('scanResult');
  el.className = `result-box show ${type}`;
  el.textContent = msg;
  if (type === 'success' || type === 'danger') {
    setTimeout(() => { el.className = 'result-box'; }, 4000);
  }
}

function togglePass() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

// ── LOGIN ──
function login() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value.trim();
  if (!email || !pass) { showAlert('loginMsg', 'Completa ambos campos.', 'danger'); return; }

  const btn = document.getElementById('btnLogin');
  btn.disabled = true; btn.textContent = 'Verificando…';
  showAlert('loginMsg', 'Conectando…', 'warning');

  callBackend('validarLogin', { correo: email, password: pass })
    .then(res => {
      btn.disabled = false; btn.textContent = 'Ingresar al sistema';
      if (res.success) {
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('mainView').classList.remove('hidden');
        document.getElementById('loginMsg').className = 'inline-alert';
        iniciarScanner();
      } else {
        showAlert('loginMsg', res.message || 'Credenciales inválidas', 'danger');
      }
    })
    .catch(() => {
      btn.disabled = false; btn.textContent = 'Ingresar al sistema';
      showAlert('loginMsg', 'Error de red. Verifica la URL del backend.', 'danger');
    });
}

function logout() {
  detenerScanner();
  document.getElementById('mainView').classList.add('hidden');
  document.getElementById('loginView').classList.remove('hidden');
  document.getElementById('email').value = '';
  document.getElementById('password').value = '';
}

// ── VISTAS ──
function showView(id) {
  document.getElementById('scannerSection').classList.add('hidden');
  document.getElementById('generatorSection').classList.add('hidden');
  document.getElementById('navScan').classList.remove('active');
  document.getElementById('navGen').classList.remove('active');
  document.getElementById(id).classList.remove('hidden');
  if (id === 'scannerSection') { document.getElementById('navScan').classList.add('active'); iniciarScanner(); }
  else { document.getElementById('navGen').classList.add('active'); detenerScanner(); }
}

// ── SCANNER ──
function iniciarScanner() {
  if (isScanning) return;
  if (scanner) { try { scanner.clear(); } catch(e){} scanner = null; }

  scanner = new Html5Qrcode("reader");
  const cfg = { fps: 10, qrbox: { width: 230, height: 230 }, aspectRatio: 1.0 };

  const tryStart = (constraint) =>
    scanner.start(constraint, cfg, onQRSuccess, () => {});

  tryStart({ facingMode: "environment" })
    .then(() => { isScanning = true; })
    .catch(() =>
      tryStart({ facingMode: "user" })
        .then(() => { isScanning = true; })
        .catch(() =>
          Html5Qrcode.getCameras()
            .then(cams => {
              if (!cams || !cams.length) { showResult('No se encontró cámara en este dispositivo.', 'danger'); return; }
              return tryStart(cams[cams.length - 1].id)
                .then(() => { isScanning = true; });
            })
            .catch(() => showResult('No se pudo acceder a la cámara. Revisa los permisos del sitio.', 'danger'))
        )
    );
}

function detenerScanner() {
  if (scanner && isScanning) {
    scanner.stop().then(() => { isScanning = false; }).catch(() => { isScanning = false; });
  }
}

function onQRSuccess(text) {
  if (isProcessing) return;
  isProcessing = true;
  showResult(`🔍 Validando ID: ${text}…`, 'info');

  callBackend('registrarEscaneo', { id: text })
    .then(res => {
      showResult(res.message, res.success ? 'success' : 'danger');
      setTimeout(() => { isProcessing = false; }, 3000);
    })
    .catch(() => {
      showResult('Error de red al validar.', 'danger');
      setTimeout(() => { isProcessing = false; }, 3000);
    });
}

// ── GENERADOR PDF ──
function toggleParams() {
  const modo = document.getElementById('modoGeneracion').value;
  document.getElementById('paramsRango').classList.add('hidden');
  document.getElementById('paramsIndividual').classList.add('hidden');
  if (modo === 'rango') document.getElementById('paramsRango').classList.remove('hidden');
  if (modo === 'individual') document.getElementById('paramsIndividual').classList.remove('hidden');
}

function generarPDF() {
  const modo = document.getElementById('modoGeneracion').value;
  const btn  = document.getElementById('btnGenerar');
  const params = { modo };

  if (modo === 'rango') {
    params.inicio = document.getElementById('rangoInicio').value;
    params.fin    = document.getElementById('rangoFin').value;
    if (!params.inicio || !params.fin) { showAlert('pdfStatus', 'Ingresa el rango completo.', 'warning'); return; }
  } else if (modo === 'individual') {
    params.ids = document.getElementById('idsIndividuales').value.trim();
    if (!params.ids) { showAlert('pdfStatus', 'Ingresa al menos un ID.', 'warning'); return; }
  }

  btn.disabled = true;
  showAlert('pdfStatus', '⏳ Generando PDF… puede tardar según la cantidad de registros.', 'info');

  callBackend('generarPDFQRs', params)
    .then(res => {
      btn.disabled = false;
      if (res.success) {
        showAlert('pdfStatus', '✅ PDF listo. Descargando…', 'success');
        const a = document.createElement('a');
        a.href = 'data:application/pdf;base64,' + res.fileData;
        a.download = res.fileName || 'Gafetes_QR.pdf';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      } else {
        showAlert('pdfStatus', '❌ ' + (res.message || 'Error al generar'), 'danger');
      }
    })
    .catch(err => {
      btn.disabled = false;
      showAlert('pdfStatus', '❌ Error de red: ' + (err.message || err), 'danger');
    });
}
</script>
</body>
</html>
